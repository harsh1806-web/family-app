<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
  font-family: Arial;
  background: #f4f6f9;
}

.family {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin: 10px 0;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.member {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 5px;
  margin: 5px 0;
}

button {
  padding: 5px 10px;
  margin-top: 5px;
  cursor: pointer;
}
  </style>
</head>
<body>

<h2>All Families</h2>
<div id="families"></div>

<h2>Family Members</h2>
<div id="members"></div>
<button onclick="downloadPDF()">Download Family PDF</button>
<button onclick="printPage()">Print / Save as PDF</button>

<script>
function loadFamilies() {
  fetch("/families")
    .then(res => res.json())
    .then(data => {

      let html = "";

      data.forEach(f => {
        html += `
          <div class="family">
            <b>${f.name}</b> (${f.email})
            <button onclick="loadMembers(${f.id})">View Members</button>
          </div>
        `;
      });

      document.getElementById("families").innerHTML = html;
    });
}

let currentFamilyName = "";

function loadMembers(familyId) {
  fetch("/families")
    .then(res => res.json())
    .then(families => {
      const family = families.find(f => f.id == familyId);
      currentFamilyName = family ? family.name : "Family";
    });

  fetch(`/members/${familyId}`)
    .then(res => res.json())
    .then(data => {

      let html = `<h3>${currentFamilyName} Family</h3>`;

      if (!data.length) {
        html += "<p>No members found</p>";
      } else {
        data.forEach(m => {
          html += `
            <div class="member">
              <b>${m.name}</b><br>
              Age: ${m.age}<br>
              Relation: ${m.relation}<br>
              Phone: ${m.phone}<br>
              Address: ${m.address}<br>
            </div>
          `;
        });
      }

      document.getElementById("members").innerHTML = html;
    });
}
function downloadPDF() {
  const content = document.getElementById("members").innerHTML;

  const newWindow = window.open("", "", "width=800,height=600");

  newWindow.document.write(`
    <html>
      <head>
        <title>${currentFamilyName} Family</title>
        <style>
          body { font-family: Arial; padding: 20px; }
          .member {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
          }
        </style>
      </head>
      <body>
        <h2>${currentFamilyName} Family Details</h2>
        ${content}
      </body>
    </html>
  `);

  newWindow.document.close();
  newWindow.print();
}
function deleteMember(id, familyId) {
  const confirmDelete = confirm("Are you sure you want to delete this member?");

  if (!confirmDelete) return;

  fetch(`/delete-member/${id}`, {
    method: "DELETE"
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);

    // ✅ reload members after delete
    loadMembers(familyId);
  })
  .catch(err => {
    console.log(err);
    alert("Error deleting member");
  });
}
function printPage() {
  window.print();
}

// Load families when page opens
loadFamilies();
</script>

</body>
</html>
