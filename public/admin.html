<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
  font-family: Arial;
  background: #f4f6f9;
}

.family {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin: 10px 0;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.member {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 5px;
  margin: 5px 0;
}

button {
  padding: 5px 10px;
  margin-top: 5px;
  cursor: pointer;
}
  </style>
</head>
<body>

<h2>All Families</h2>
<div id="families"></div>

<h2>Family Members</h2>
<div id="members"></div>
<button onclick="printPage()">Print / Save as PDF</button>

<script>
function loadFamilies() {
  fetch("/families")
    .then(res => res.json())
    .then(data => {

      let html = "";

      data.forEach(f => {
        html += `
          <div class="family">
            <b>${f.name}</b> (${f.email})
            <button onclick="loadMembers(${f.id})">View Members</button>
          </div>
        `;
      });

      document.getElementById("families").innerHTML = html;
    });
}

function loadMembers(familyId) {
  fetch(`/members/${familyId}`)
    .then(res => res.json())
    .then(data => {

      if (!data.length) {
        document.getElementById("members").innerHTML = "<p>No members found</p>";
        return;
      }

      let html = "";

      data.forEach(m => {
  html += `
    <div class="member">
      <b>${m.name}</b><br>
      Age: ${m.age}<br>
      Relation: ${m.relation}<br>
      Phone: ${m.phone}<br>

      <button onclick="deleteMember(${m.id}, ${familyId})">Delete</button>
    </div>
  `;
});

      document.getElementById("members").innerHTML = html;
    });
}
function deleteMember(id, familyId) {
  const confirmDelete = confirm("Are you sure you want to delete this member?");

  if (!confirmDelete) return;

  fetch(`/delete-member/${id}`, {
    method: "DELETE"
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);

    // ✅ reload members after delete
    loadMembers(familyId);
  })
  .catch(err => {
    console.log(err);
    alert("Error deleting member");
  });
}
function printPage() {
  window.print();
}

// Load families when page opens
loadFamilies();
</script>

</body>
</html>
