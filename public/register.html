<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <!-- ✅ MOBILE RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    <style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #06b6d4, #3b82f6);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* Card */
.box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 15px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
h2 {
  margin-bottom: 20px;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a34a;
  transform: scale(1.03);
}

/* Link */
a {
  color: #facc15;
  text-decoration: none;
}

/* 📱 MOBILE */
@media (max-width: 480px) {
  .box {
    padding: 25px;
    border-radius: 12px;
  }

  h2 {
    font-size: 20px;
  }
}

/* 💻 LARGE SCREEN */
@media (min-width: 900px) {
  .box {
    max-width: 420px;
    padding: 40px;
  }
}
</style>
</head>

<body>

<div class="box">
  <h2>Register</h2>

  <form id="registerForm">
    <input type="text" id="name" name="name" placeholder="Family Name" required>
<input type="email" id="email" name="email" placeholder="Email" required>
<input type="password" id="password" name="password" placeholder="Password" required>

    <button type="submit">Register</button>
  </form>

  <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script src="script.js"></script>

</body>
</html>
