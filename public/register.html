<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <!-- ✅ MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* Left Side (optional design) */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #6366f1, #3b82f6);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 30px;
    }

    .left h1 {
      margin-bottom: 10px;
    }

    /* Right Side (form) */
    .right {
      flex: 1;
      padding: 40px;
    }

    .right h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    a {
      color: #3b82f6;
      text-decoration: none;
      font-size: 14px;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left {
        display: none; /* hide left side on mobile */
      }

      .right {
        padding: 25px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1>Family App 👨‍👩‍👧‍👦</h1>
    <p>Create your family records easily</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h2>Create Account ✨</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Family Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Register 🚀</button>
    </form>

    <p style="margin-top:10px;">
      Already have account? <a href="login.html">Login</a>
    </p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
