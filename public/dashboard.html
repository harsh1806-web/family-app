<!DOCTYPE html>
<html>
<head>
  <title>Family App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  display: flex;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

.sidebar {
  width: 240px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 25px;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  background: #1e293b;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.main {
  flex: 1;
  padding: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 12px;
  background: #3b82f6;
  color: white;
  border-radius: 8px;
  border: none;
}

ul {
  list-style: none;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Family App</h2>
  <button onclick="showSection('add')">➕ Add Member</button>
  <button onclick="showSection('list')">📋 View Members</button>
</div>

<div class="main">

<div id="add" class="card">
  <h3>Add Member</h3>

  <input id="name" placeholder="Name">
  <input type="date" id="dob">
  <p id="calculatedAge"></p>

  <select id="relation">
    <option>Head</option>
    <option>Spouse</option>
    <option>Son</option>
    <option>Daughter</option>
  </select>

  <input id="phone" placeholder="Phone">
  <input id="address" placeholder="Address">
  <input id="business" placeholder="Business">
  <input id="education" placeholder="Education">
  <input id="hobbies" placeholder="Hobbies">

  <input type="file" id="photo">

  <select id="parent">
    <option value="0">No Parent</option>
  </select>

  <button onclick="addMember(this)">Add</button>
</div>

<div id="list" class="card" style="display:none;">
  <h3>Members</h3>
  <div id="members"></div>
</div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

function showSection(id) {
  document.getElementById("add").style.display = "none";
  document.getElementById("list").style.display = "none";
  document.getElementById(id).style.display = "block";

  if (id === "list") loadMembers();
  if (id === "add") loadParentOptions();
}

// ✅ ADD MEMBER
function addMember(button) {
  button.innerText = "Adding...";
  button.disabled = true;

  const formData = new FormData();

  const dob = document.getElementById("dob").value;

  if (!dob) {
    alert("Select DOB");
    return;
  }

  const birthDate = new Date(dob);
  const today = new Date();

  let age = today.getFullYear() - birthDate.getFullYear();
  const m = today.getMonth() - birthDate.getMonth();

  if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
    age--;
  }

  formData.append("family_id", user.id);
  formData.append("name", document.getElementById("name").value);
  formData.append("age", age);
  formData.append("dob", dob);
  formData.append("relation", document.getElementById("relation").value);
  formData.append("parent_id", document.getElementById("parent").value);
  formData.append("phone", document.getElementById("phone").value);
  formData.append("address", document.getElementById("address").value);
  formData.append("business_address", document.getElementById("business").value);
  formData.append("education", document.getElementById("education").value);
  formData.append("hobbies", document.getElementById("hobbies").value);

  const file = document.getElementById("photo").files[0];
  if (file) formData.append("photo", file);

  fetch("/add-member", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);

    button.innerText = "Add";
    button.disabled = false;

    loadMembers();
  })
  .catch(() => {
    alert("Error adding member");
    button.innerText = "Add";
    button.disabled = false;
  });
}

// ✅ LOAD MEMBERS
function loadMembers() {
  fetch(`/members/${user.id}`)
    .then(res => res.json())
    .then(data => {

      function buildTree(parentId) {
        let html = "<ul>";

        data.filter(m => m.parent_id == parentId).forEach(m => {
          html += `
          <li>
            <img src="/uploads/${m.photo}" width="50" style="border-radius:50%">
            <b>${m.name}</b><br>
            Age: ${m.age}<br>
            DOB: ${m.dob}<br>

            <button onclick="deleteMember(${m.id})">Delete</button>

            ${buildTree(m.id)}
          </li>`;
        });

        html += "</ul>";
        return html;
      }

      document.getElementById("members").innerHTML = buildTree(0);
    });
}

// ✅ DELETE
function deleteMember(id) {
  fetch(`/delete-member/${id}`, { method: "DELETE" })
    .then(res => res.json())
    .then(() => loadMembers());
}

// ✅ LOAD PARENTS
function loadParentOptions() {
  fetch(`/members/${user.id}`)
    .then(res => res.json())
    .then(data => {
      let options = `<option value="0">No Parent</option>`;
      data.forEach(m => {
        options += `<option value="${m.id}">${m.name}</option>`;
      });
      document.getElementById("parent").innerHTML = options;
    });
}

// ✅ AGE DISPLAY
document.getElementById("dob").addEventListener("change", function () {
  const dob = new Date(this.value);
  const today = new Date();

  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();

  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
    age--;
  }

  document.getElementById("calculatedAge").innerText = "Age: " + age;
});
</script>

</body>
</html>
