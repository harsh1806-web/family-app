<!DOCTYPE html>
<html>
<head>
  <title>Family App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #1e293b;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      background: #334155;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .sidebar button:hover {
      background: #475569;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    .member {
      background: #f1f5f9;
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Family App</h2>
  <button onclick="showSection('add')">Add Member</button>
  <button onclick="showSection('list')">View Members</button>
</div>

<div class="main">

  <!-- ADD MEMBER -->
  <div id="add" class="card">
    <h3>Add Member</h3>

    <input id="name" placeholder="Name / नाम">
<input id="age" placeholder="Age / उम्र">

<select id="relation">
  <option>Head / मुखिया</option>
  <option>Spouse / पति-पत्नी</option>
  <option>Son / बेटा</option>
  <option>Daughter / बेटी</option>
</select>

<input id="phone" placeholder="Phone / फोन">
<input id="address" placeholder="Address / पता">
<input id="business" placeholder="Business Address / व्यवसाय पता">
<input id="education" placeholder="Education / शिक्षा">
<input id="hobbies" placeholder="Hobbies / शौक">

    <button onclick="addMember(this)">Add</button>
  </div>

  <!-- MEMBERS LIST -->
  <div id="list" class="card" style="display:none;">
    <h3>Members</h3>
    <div id="members"></div>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  alert("Please login again");
  window.location.href = "/login.html";
}

function showSection(id) {
  document.getElementById("add").style.display = "none";
  document.getElementById("list").style.display = "none";
  document.getElementById(id).style.display = "block";

  if (id === "list") loadMembers();
}

function addMember(button) {
  button.disabled = true;
  button.innerText = "Adding...";

  if (!user) {
    alert("User not logged in");
    button.disabled = false;
    button.innerText = "Add";
    return;
  }

  const payload = {
    family_id: user.id,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    relation: document.getElementById("relation").value,
    parent_id: 0,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    business_address: document.getElementById("business").value,
    education: document.getElementById("education").value,
    hobbies: document.getElementById("hobbies").value
  };

  fetch("/add-member", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message || "Member added");

    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("relation").selectedIndex = 0;

    button.disabled = false;
    button.innerText = "Add";

    loadMembers();
  })
  .catch(err => {
    console.log(err);
    alert("Error adding member");

    button.disabled = false;
    button.innerText = "Add";
  });
}
    

function loadMembers() {
  fetch(`/members/${user.id}`)
    .then(res => res.json())
    .then(data => {

      if (!data.length) {
        document.getElementById("members").innerHTML =
          "<p>No members found</p>";
        return;
      }

      let html = "";

      data.forEach(m => {
        html += `
          <div class="member">
            <b>${m.name}</b><br>
            Age: ${m.age}<br>
            Relation: ${m.relation}<br>
            Phone: ${m.phone}<br>
            Address: ${m.address}<br>
            Education: ${m.education}<br>
            Hobbies: ${m.hobbies}
          </div>
        `;
      });

      document.getElementById("members").innerHTML = html;
    })
    .catch(err => {
      console.log(err);
    });
}
</script>

</body>
</html>
