<!DOCTYPE html>
<html>
<head>
  <title>Family App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  display: flex;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 25px;
}

.sidebar h2 {
  margin-bottom: 40px;
  font-weight: 600;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border: none;
  background: #1e293b;
  color: white;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

.sidebar button:hover {
  background: #3b82f6;
}

/* Main */
.main {
  flex: 1;
  padding: 30px;
}

/* Card */
.card {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

/* Inputs */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.2s;
}

input:focus, select:focus {
  border-color: #3b82f6;
}

/* Button */
button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

/* Member card */
.member {
  background: #f1f5f9;
  padding: 15px;
  border-radius: 10px;
  margin: 10px 0;
  transition: 0.3s;
}

.member:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);

}
/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px) {

  body {
    flex-direction: column;
  }

  /* Sidebar becomes top bar */
  .sidebar {
    width: 100%;
    height: auto;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px;
  }

  .sidebar h2 {
    display: none; /* hide title on mobile */
  }

  .sidebar button {
    width: auto;
    padding: 10px;
    font-size: 14px;
  }

  /* Main content full width */
  .main {
    padding: 15px;
  }

  /* Card spacing */
  .card {
    padding: 15px;
    border-radius: 10px;
  }

  /* Inputs */
  input, select {
    padding: 10px;
    font-size: 14px;
  }

  /* Button */
  button {
    padding: 10px;
    font-size: 14px;
  }

  /* Member cards */
  .member {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Family App</h2>
  <button onclick="showSection('add')">➕ Add Member</button>
<button onclick="showSection('list')">📋 View Members</button>
</div>

<div class="main">

  <!-- ADD MEMBER -->
  <div id="add" class="card">
    <h3>Add Member</h3>

    <input id="name" placeholder="Name / नाम">
<input id="age" placeholder="Age / उम्र">

<select id="relation">
  <option>Head / मुखिया</option>
  <option>Spouse / पति-पत्नी</option>
  <option>Son / बेटा</option>
  <option>Daughter / बेटी</option>
</select>

<input id="phone" placeholder="Phone / फोन">
<input id="address" placeholder="Address / पता">
<input id="business" placeholder="Business Address / व्यवसाय पता">
<input id="education" placeholder="Education / शिक्षा">
<input id="hobbies" placeholder="Hobbies / शौक">

    <button onclick="addMember(this)">Add</button>
  </div>

  <!-- MEMBERS LIST -->
  <div id="list" class="card" style="display:none;">
    <h3>👨‍👩‍👧‍👦 Family Members</h3>
    <div id="members"></div>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  alert("Please login again");
  window.location.href = "/login.html";
}

function showSection(id) {
  document.getElementById("add").style.display = "none";
  document.getElementById("list").style.display = "none";
  document.getElementById(id).style.display = "block";

  if (id === "list") loadMembers();
}

function addMember(button) {
  button.disabled = true;
  button.innerText = "Adding...";

  if (!user) {
    alert("User not logged in");
    button.disabled = false;
    button.innerText = "Add";
    return;
  }

  const payload = {
    family_id: user.id,
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    relation: document.getElementById("relation").value,
    parent_id: 0,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    business_address: document.getElementById("business").value,
    education: document.getElementById("education").value,
    hobbies: document.getElementById("hobbies").value
  };

  fetch("/add-member", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message || "Member added");

    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("relation").selectedIndex = 0;

    button.disabled = false;
    button.innerText = "Add";

    loadMembers();
  })
  .catch(err => {
    console.log(err);
    alert("Error adding member");

    button.disabled = false;
    button.innerText = "Add";
  });
}
    

function loadMembers() {
  fetch(`/members/${user.id}`)
    .then(res => res.json())
    .then(data => {

      if (!data.length) {
        document.getElementById("members").innerHTML =
          "<p>No members found</p>";
        return;
      }

      let html = "";

      data.forEach(m => {
        html += `
          <div class="member">
            <b>${m.name}</b><br>
            Age: ${m.age}<br>
            Relation: ${m.relation}<br>
            Phone: ${m.phone}<br>
            Address: ${m.address}<br>
            Education: ${m.education}<br>
            Hobbies: ${m.hobbies}
          </div>
        `;
      });

      document.getElementById("members").innerHTML = html;
    })
    .catch(err => {
      console.log(err);
    });
}
</script>

</body>
</html>
