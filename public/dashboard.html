<!DOCTYPE html>
<html>
<head>
  <title>Family App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  display: flex;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: #0f172a;
  color: white;
  height: 100vh;
  padding: 25px;
}

.sidebar h2 {
  margin-bottom: 40px;
  font-weight: 600;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border: none;
  background: #1e293b;
  color: white;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

.sidebar button:hover {
  background: #3b82f6;
}

/* Main */
.main {
  flex: 1;
  padding: 30px;
}

/* Card */
.card {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

/* Inputs */
input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.2s;
}

input:focus, select:focus {
  border-color: #3b82f6;
}

/* Button */
button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

/* Member card */
.member {
  background: #f1f5f9;
  padding: 15px;
  border-radius: 10px;
  margin: 10px 0;
  transition: 0.3s;
}

.member:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);

}
/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px) {

  body {
    flex-direction: column;
  }

  /* Sidebar becomes top bar */
  .sidebar {
    width: 100%;
    height: auto;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px;
  }

  .sidebar h2 {
    display: none; /* hide title on mobile */
  }

  .sidebar button {
    width: auto;
    padding: 10px;
    font-size: 14px;
  }

  /* Main content full width */
  .main {
    padding: 15px;
  }

  /* Card spacing */
  .card {
    padding: 15px;
    border-radius: 10px;
  }

  /* Inputs */
  input, select {
    padding: 10px;
    font-size: 14px;
  }

  /* Button */
  button {
    padding: 10px;
    font-size: 14px;
  }

  /* Member cards */
  .member {
    font-size: 14px;
  }
}
ul {
  list-style: none;
  padding-left: 20px;
}

li {
  margin: 10px 0;
  padding: 10px;
  background: #e0f2fe;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Family App</h2>
  <button onclick="showSection('add')">➕ Add Member</button>
<button onclick="showSection('list')">📋 View Members</button>
</div>

<div class="main">

  <!-- ADD MEMBER -->
  <div id="add" class="card">
    <h3>Add Member</h3>

    <input id="name" placeholder="Name / नाम">
<input type="date" id="dob">
<p id="calculatedAge" style="font-size:14px; color:gray;"></p>

<select id="relation">
  <option>Head / मुखिया</option>
  <option>Spouse / पति-पत्नी</option>
  <option>Head of family's sister / परिवार के मुखिया की बहन</option>
  <option>Head of family's son / परिवार के मुखिया का बेटा</option>
  <option>Head of family's daughter in law / परिवार के मुखिया की बहू</option>
  <option>Daughter / परिवार के मुखिया की बेटी</option>
  <option>Son-in-law / परिवार के मुखिया का दामाद (if married)</option>
  <option>Grandson / परिवार के मुखिया का पोता  </option>
  <option>Granddaughter / परिवार के मुखिया की पोती</option>


</select>

<input id="phone" placeholder="Phone / फोन">
<input id="address" placeholder="Address / पता">
<input id="business" placeholder="Business Address / व्यवसाय पता">
<input id="education" placeholder="Education / शिक्षा">
<input id="hobbies" placeholder="Hobbies / शौक">
<input type="file" id="photo" accept="image/*">
    <label><b>Belongs To (Parent Member)</b></label>

<select id="parent">
  <option value="0">No Parent (Head of Family)</option>
</select>
<p style="font-size: 12px; color: gray;">
  👉 Choose who this member belongs to (for family tree)
</p>

<button onclick="addMember(this)">Add</button>
  </div>

  <!-- MEMBERS LIST -->
  <div id="list" class="card" style="display:none;">
    <h3>👨‍👩‍👧‍👦 Family Members</h3>
    <div id="members"></div>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  alert("Please login again");
  window.location.href = "/login.html";
}

function showSection(id) {
  document.getElementById("add").style.display = "none";
  document.getElementById("list").style.display = "none";
  document.getElementById(id).style.display = "block";

  if (id === "list") loadMembers();

  if (id === "add") loadParentOptions(); // ✅ ADD THIS
}

function addMember(button) {
  button.disabled = true;
  button.innerText = window.editingId ? "Updating..." : "Adding...";

  if (!user) {
    alert("User not logged in");
    button.disabled = false;
    button.innerText = "Add";
    return;
  }

  const formData = new FormData();

  formData.append("family_id", user.id);
  formData.append("name", document.getElementById("name").value);
  formData.append("age", document.getElementById("age").value);
  formData.append("relation", document.getElementById("relation").value);
  formData.append("parent_id", document.getElementById("parent").value);
  formData.append("phone", document.getElementById("phone").value);
  formData.append("address", document.getElementById("address").value);
  formData.append("business_address", document.getElementById("business").value);
  formData.append("education", document.getElementById("education").value);
  formData.append("hobbies", document.getElementById("hobbies").value);

  // ✅ ADD PHOTO
  const file = document.getElementById("photo").files[0];
  if (file) {
    formData.append("photo", file);
  }

  const url = window.editingId 
    ? `/update-member/${window.editingId}` 
    : "/add-member";

  const method = window.editingId ? "PUT" : "POST";

  fetch(url, {
    method: method,
    body: formData   // ❌ NO JSON, ONLY formData
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message || "Member added");

    window.editingId = null;

    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("relation").selectedIndex = 0;

    button.disabled = false;
    button.innerText = "Add";

    loadMembers();
  })
  .catch(err => {
    console.log(err);
    alert("Error adding member");

    button.disabled = false;
    button.innerText = "Add";
  

    loadMembers();
  })
  .catch(err => {
    console.log(err);
    alert("Error adding member");

    button.disabled = false;
    button.innerText = "Add";
  });
  const dob = document.getElementById("dob").value;

// calculate age again before sending
const birthDate = new Date(dob);
const today = new Date();

let age = today.getFullYear() - birthDate.getFullYear();
const m = today.getMonth() - birthDate.getMonth();

if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
  age--;
}
}
    

function loadMembers() {
  fetch(`/members/${user.id}`)
    .then(res => res.json())
    .then(data => {

      function buildTree(parentId) {
        let html = "<ul>";

        data
          .filter(m => m.parent_id == parentId)
          .forEach(m => {
            html += `
  <li>
    
  <img 
  src="/uploads/${m.photo}" 
  width="60" 
  style="border-radius:50%; cursor:pointer"
  onclick="showPhoto('/uploads/${m.photo}')"
/>
  
  <li>
    <b>${m.name}</b><br>
    Age: ${m.age}<br>
    DOB: ${m.dob}<br>
    Relation: ${m.relation}<br>

    <button onclick="editMember(${m.id}, '${m.name}', '${m.age}', '${m.relation}', '${m.phone}', '${m.address}', '${m.business_address}', '${m.education}', '${m.hobbies}')">
      ✏️ Edit
    </button>

    ${buildTree(m.id)}
  </li>
`;
          });

        html += "</ul>";
        return html;
      }

      document.getElementById("members").innerHTML = buildTree(0);
    });
}
function loadParentOptions() {
  fetch(`/members/${user.id}`)
    .then(res => res.json())
    .then(data => {

      let options = `<option value="0">👑 Head of Family (No Parent)</option>`;

      data.forEach(m => {
        options += `<option value="${m.id}">${m.name}</option>`;
      });

      document.getElementById("parent").innerHTML = options;
    });
}
function editMember(id, name, age, relation, phone, address, business, education, hobbies) {

  document.getElementById("name").value = name;
  document.getElementById("age").value = age;
  document.getElementById("relation").value = relation;
  document.getElementById("phone").value = phone;
  document.getElementById("address").value = address;
  document.getElementById("business").value = business;
  document.getElementById("education").value = education;
  document.getElementById("hobbies").value = hobbies;

  window.editingId = id;

  showSection("add");
}
function showPhoto(src) {
  document.getElementById("photoModal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}

document.getElementById("photoModal").onclick = () => {
  document.getElementById("photoModal").style.display = "none";
};
document.getElementById("dob").addEventListener("change", function () {
  const dob = new Date(this.value);
  const today = new Date();

  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();

  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
    age--;
  }

  document.getElementById("calculatedAge").innerText = "Age: " + age;
});
</script>
<div id="photoModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
">
  <img id="modalImg" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>
</body>
</html>
